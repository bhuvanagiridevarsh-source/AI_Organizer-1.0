<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>system janizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>

/* ══════════════════════════════════════════════════════════
   PALETTE — DARK (default)
══════════════════════════════════════════════════════════ */
:root {
  --paper:       #0F0D0B;
  --surface:     #161310;
  --surface-2:   #1E1A16;
  --surface-3:   #252018;
  --kachi:       #1A2233;
  --kachi-soft:  #243044;
  --kachi-line:  rgba(42,62,92,0.6);
  --ink:         #E8E2D9;
  --ink-2:       #A89E91;
  --ink-3:       #6B6259;
  --ink-4:       #3D3830;
  --seal:        #C94020;
  --seal-soft:   #A33318;
  --seal-glow:   rgba(201,64,32,0.15);
  --line:        rgba(232,226,217,0.07);
  --line-2:      rgba(232,226,217,0.04);
  --shoji:       rgba(232,226,217,0.028);
  --overlay-bg:  rgba(8,7,5,0.85);
  --topbar-bg:   rgba(8,7,5,0.75);
  --rail-bg:     rgba(8,7,5,0.35);
  --scrollbar:   rgba(232,226,217,0.10);
}

/* ══════════════════════════════════════════════════════════
   PALETTE — LIGHT
══════════════════════════════════════════════════════════ */
html.light {
  --paper:       #F1ECE1;
  --surface:     #F8F5EC;
  --surface-2:   #FDFAF3;
  --surface-3:   #EDE8DC;
  --kachi:       #E4EAF5;
  --kachi-soft:  #D4DEF0;
  --kachi-line:  rgba(42,62,92,0.22);
  --ink:         #1B1813;
  --ink-2:       #524C42;
  --ink-3:       #8B8478;
  --ink-4:       #B6AFA1;
  --seal:        #B23A1F;
  --seal-soft:   #8C2E18;
  --seal-glow:   rgba(178,58,31,0.10);
  --line:        rgba(27,24,19,0.09);
  --line-2:      rgba(27,24,19,0.05);
  --shoji:       rgba(27,24,19,0.04);
  --overlay-bg:  rgba(241,236,225,0.88);
  --topbar-bg:   rgba(241,236,225,0.88);
  --rail-bg:     rgba(241,236,225,0.5);
  --scrollbar:   rgba(27,24,19,0.12);
}

/* ══════════════════════════════════════════════════════════
   BASE
══════════════════════════════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Geist', system-ui, sans-serif;
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  transition: background 350ms ease, color 350ms ease;
  background-image:
    linear-gradient(var(--shoji) 1px, transparent 1px),
    linear-gradient(90deg, var(--shoji) 1px, transparent 1px),
    radial-gradient(ellipse at 30% 20%, rgba(26,34,51,0.4) 0, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(201,64,32,0.03) 0, transparent 50%);
  background-size: 48px 48px, 48px 48px, 100% 100%, 100% 100%;
}
html.light body {
  background-image:
    linear-gradient(var(--shoji) 1px, transparent 1px),
    linear-gradient(90deg, var(--shoji) 1px, transparent 1px),
    radial-gradient(ellipse at 30% 20%, rgba(210,220,240,0.4) 0, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(178,58,31,0.03) 0, transparent 50%);
  background-size: 48px 48px, 48px 48px, 100% 100%, 100% 100%;
}

/* ── Typography ── */
.serif-i { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; letter-spacing: -0.02em; }
.serif   { font-family: 'Instrument Serif', serif; font-weight: 400; }
.mono    { font-family: 'Geist Mono', monospace; font-weight: 400; }
.mono-l  { font-family: 'Geist Mono', monospace; font-weight: 300; }
.quiet   { color: var(--ink-3); }

/* ── Resets ── */
button, input { font: inherit; color: inherit; background: none; border: 0; outline: 0; cursor: pointer; }
::selection   { background: rgba(201,64,32,0.22); color: var(--ink); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 2px; }
:focus-visible { outline: 1px solid var(--seal); outline-offset: 2px; }

/* ══════════════════════════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════════════════════════ */
@keyframes fade-up   { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
@keyframes fade-in   { from { opacity:0; } to { opacity:1; } }
@keyframes dot-breathe { 0%,100%{ opacity:0.35 } 50%{ opacity:1 } }
@keyframes cursor-blink { 0%,49%{ opacity:1 } 50%,100%{ opacity:0 } }
@keyframes seal-pulse {
  0%   { box-shadow: 0 0 0 0 rgba(201,64,32,0); }
  45%  { box-shadow: 0 0 0 8px rgba(201,64,32,0.16); }
  100% { box-shadow: 0 0 0 14px rgba(201,64,32,0); }
}

/* Scanline drift — faint texture, barely there */
.scanline-layer {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px, transparent 5px,
    rgba(232,226,217,0.010) 5px, rgba(232,226,217,0.010) 6px
  );
}
html.light .scanline-layer {
  background: repeating-linear-gradient(
    0deg,
    transparent 0px, transparent 5px,
    rgba(27,24,19,0.008) 5px, rgba(27,24,19,0.008) 6px
  );
}

/* ══════════════════════════════════════════════════════════
   LAYOUT SHELL
══════════════════════════════════════════════════════════ */
#root {
  display: flex; flex-direction: column; height: 100vh;
  position: relative; z-index: 1;
}
.body-row { display: flex; flex: 1; min-height: 0; }

/* ══════════════════════════════════════════════════════════
   TOP BAR
══════════════════════════════════════════════════════════ */
.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 0 24px;
  height: 48px;
  border-bottom: 1px solid var(--line);
  background: var(--topbar-bg);
  backdrop-filter: blur(12px);
  flex: none;
  transition: background 350ms ease, border-color 350ms ease;
}
.wordmark {
  display: flex; align-items: center; gap: 0;
  flex: none;
}
.wordmark-text {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--ink);
  letter-spacing: -0.01em;
  line-height: 1;
}
.topbar-stat {
  font-family: 'Geist Mono', monospace;
  font-size: 10px; letter-spacing: 0.09em; color: var(--ink-3);
  white-space: nowrap;
}
.vdiv {
  width: 1px; background: var(--line);
  align-self: stretch; margin: 11px 0; flex: none;
}
.topbar-spacer { flex: 1; }

/* Toggle buttons */
.icon-btn {
  display: flex; align-items: center; justify-content: center;
  width: 28px; height: 28px;
  border: 1px solid var(--line);
  background: transparent;
  font-size: 12px; color: var(--ink-3);
  transition: all 180ms ease;
  flex: none;
  border-radius: 2px;
}
.icon-btn:hover { border-color: rgba(201,64,32,0.4); color: var(--ink); background: var(--surface-2); }
.icon-btn.active { border-color: rgba(201,64,32,0.5); color: var(--seal); background: var(--seal-glow); }
.icon-btn.theme-btn { font-size: 14px; }

/* Ask button */
.ask-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 12px;
  border: 1px solid var(--line);
  background: var(--surface-2);
  font-size: 12px; color: var(--ink-2);
  transition: all 180ms ease; flex: none;
}
.ask-btn:hover { border-color: rgba(201,64,32,0.4); color: var(--ink); }
.kbdchord {
  font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--ink-4);
  display: flex; gap: 2px;
}
.kbdchord span { padding: 1px 4px; border: 1px solid var(--ink-4); }

/* ══════════════════════════════════════════════════════════
   SIDE RAIL
══════════════════════════════════════════════════════════ */
.rail {
  width: 210px; flex: none;
  border-right: 1px solid var(--line);
  padding: 22px 16px 16px;
  display: flex; flex-direction: column;
  overflow-y: auto;
  background: var(--rail-bg);
  transition: background 350ms ease, border-color 350ms ease;
}
.rail-group { margin-bottom: 26px; }
.rail-label {
  font-family: 'Geist Mono', monospace;
  font-size: 9px; letter-spacing: 0.14em; color: var(--ink-4);
  text-transform: uppercase; margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.rail-label::after { content: ''; flex: 1; height: 1px; background: var(--line); }
.rail-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 4px;
  font-size: 13px; color: var(--ink-2);
  transition: color 140ms ease;
  cursor: pointer; border: none; background: none;
  width: 100%; text-align: left;
}
.rail-item:hover { color: var(--ink); }
.rail-item.active { color: var(--ink); }
.rail-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: transparent; flex: none; transition: background 140ms ease;
}
.rail-item.active .rail-dot { background: var(--seal); }
.rail-count {
  font-family: 'Geist Mono', monospace;
  font-size: 10px; color: var(--ink-4); margin-left: auto;
  transition: color 140ms ease;
}
.rail-item.active .rail-count { color: var(--ink-3); }
.rail-item.inbox-item .rail-count { color: var(--seal); }

.rail-spacer { flex: 1; }

/* Tidy button */
.tidy-btn {
  padding: 14px 14px; background: var(--surface-2);
  border: 1px solid var(--line) !important;
  text-align: left; width: 100%; cursor: pointer;
  transition: border-color 200ms ease, background 350ms ease;
  position: relative; overflow: hidden; margin-bottom: 14px;
}
.tidy-btn:hover { border-color: rgba(201,64,32,0.3) !important; }
.tidy-kanji {
  position: absolute; right: 10px; bottom: 6px;
  font-size: 42px; font-family: serif;
  color: rgba(201,64,32,0.07);
  line-height: 1; pointer-events: none;
  transition: opacity 300ms ease;
}

/* Sys status */
.sys-status {
  padding-top: 12px; border-top: 1px solid var(--line);
}
.sys-row {
  display: flex; align-items: center; gap: 6px;
  font-family: 'Geist Mono', monospace;
  font-size: 10px; color: var(--ink-4); line-height: 1.9;
}
.sys-led { width: 5px; height: 5px; border-radius: 50%; flex: none; }
.sys-led.ready  { background: #4a7c52; box-shadow: 0 0 4px rgba(74,124,82,0.5); }
.sys-led.active { background: var(--seal); animation: dot-breathe 1.5s ease-in-out infinite; }

/* ══════════════════════════════════════════════════════════
   MAIN CONTENT AREA
══════════════════════════════════════════════════════════ */
.main {
  flex: 1; min-width: 0;
  overflow-y: auto; overflow-x: hidden;
  padding: 48px 60px 96px;
}

/* ── Page header ── */
.page-header {
  display: flex; align-items: flex-end; gap: 40px;
  margin-bottom: 40px;
}
.datestamp {
  font-family: 'Geist Mono', monospace;
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink-4); margin-bottom: 16px;
}
.headline {
  font-family: 'Instrument Serif', serif;
  font-style: italic; font-weight: 400;
  font-size: 54px; line-height: 1.03;
  letter-spacing: -0.02em; color: var(--ink);
  max-width: 780px;
}
.headline .soft { color: var(--ink-3); }

/* ── Ask bar ── */
.ask-bar {
  border: 1px solid var(--line);
  background: var(--surface);
  padding: 16px 22px;
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 56px;
  transition: border-color 250ms ease, background 250ms ease;
}
.ask-bar:focus-within {
  border-color: rgba(201,64,32,0.3);
  background: var(--surface-2);
  background-image: repeating-linear-gradient(
    0deg, transparent 0px, transparent 3px,
    rgba(232,226,217,0.013) 3px, rgba(232,226,217,0.013) 4px
  );
}
html.light .ask-bar:focus-within {
  background-image: repeating-linear-gradient(
    0deg, transparent 0px, transparent 3px,
    rgba(27,24,19,0.013) 3px, rgba(27,24,19,0.013) 4px
  );
}
.ask-prompt {
  font-size: 15px; color: rgba(201,64,32,0.6);
  font-family: 'Geist Mono', monospace; flex: none;
  transition: color 200ms ease;
}
.ask-bar:focus-within .ask-prompt { color: var(--seal); }
.ask-input {
  flex: 1; font-size: 16px; color: var(--ink);
  font-family: 'Geist', sans-serif;
  background: none;
}
.ask-input::placeholder { color: var(--ink-4); font-style: italic; }
.ask-bar:focus-within .ask-input { font-family: 'Geist Mono', monospace; font-size: 14px; }

/* ── Section heads ── */
.section-head {
  display: flex; align-items: baseline; gap: 16px;
  padding-bottom: 13px; border-bottom: 1px solid var(--line);
  margin-bottom: 22px;
}
.section-num { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--ink-4); letter-spacing: 0.08em; min-width: 22px; }
.section-title { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 24px; font-weight: 400; color: var(--ink); line-height: 1.1; }
.section-sub { font-size: 12px; color: var(--ink-3); }
.section-right { margin-left: auto; }
.section-link {
  font-size: 12px; color: var(--ink-3); border-bottom: 1px solid transparent;
  padding-bottom: 1px; transition: color 150ms ease, border-color 150ms ease;
  cursor: pointer;
}
.section-link:hover { color: var(--ink); border-color: var(--line); }

/* ── Inbox cards ── */
.inbox-grid {
  display: grid;
  grid-template-columns: repeat(6, minmax(0,1fr));
  gap: 14px; margin-bottom: 64px;
}
.inbox-card {
  padding: 14px; background: var(--surface);
  border: 1px solid var(--line);
  cursor: pointer; position: relative; overflow: hidden;
  transition: border-color 180ms ease, background 180ms ease;
}
.inbox-card:hover { border-color: rgba(201,64,32,0.22); background: var(--surface-2); }

/* Kanji type ghost — hidden when no-kanji is active */
.inbox-card::after {
  position: absolute; bottom: 6px; right: 6px;
  font-family: serif; font-size: 28px;
  color: rgba(232,226,217,0.05); pointer-events: none;
}
html.light .inbox-card::after { color: rgba(27,24,19,0.05); }
.inbox-card[data-ext="pdf"]::after   { content: '書'; }
.inbox-card[data-ext="xlsx"]::after  { content: '算'; }
.inbox-card[data-ext="jpg"]::after   { content: '画'; }
.inbox-card[data-ext="mp3"]::after   { content: '音'; }
.inbox-card[data-ext="md"]::after    { content: '文'; }
.inbox-card[data-ext="zip"]::after   { content: '束'; }
html.no-kanji .inbox-card::after { content: none; }
html.no-kanji .tidy-kanji { opacity: 0; pointer-events: none; }
html.no-kanji .disambig-kanji { opacity: 0; pointer-events: none; }
html.no-kanji .footer-kanji { display: none; }
html.no-kanji .coll-hanko { display: none; }

.file-glyph {
  width: 28px; height: 34px; background: var(--surface-2);
  border: 1px solid var(--line);
  position: relative; margin-bottom: 10px; flex: none;
}
.file-glyph::before {
  content: ''; position: absolute; top: 0; right: 0;
  width: 8px; height: 8px; background: var(--surface);
  border-left: 1px solid var(--line); border-bottom: 1px solid var(--line);
}
.file-ext {
  position: absolute; bottom: 3px; left: 3px;
  font-family: 'Geist Mono', monospace; font-size: 7px; letter-spacing: 0.06em; color: var(--ink-3);
}
.inbox-name {
  font-size: 12px; color: var(--ink);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 8px;
}
.conf-label { font-family: 'Geist Mono', monospace; font-size: 9px; letter-spacing: 0.06em; color: var(--ink-4); margin-bottom: 5px; }
.conf-track { height: 2px; background: var(--line); position: relative; margin-bottom: 8px; }
.conf-fill { position: absolute; left: 0; top: 0; height: 100%; transition: width 600ms cubic-bezier(.22,.61,.36,1); }
.conf-fill.high { background: var(--seal); }
.conf-fill.mid  { background: var(--seal-soft); opacity: 0.75; }
.conf-fill.low  { background: var(--ink-4); }
.inbox-guess {
  font-family: 'Instrument Serif', serif;
  font-style: italic; font-size: 13px; color: var(--ink-2); line-height: 1.2;
}
.inbox-actions {
  margin-top: 10px; display: flex; gap: 10px;
  opacity: 0; transform: translateY(4px);
  transition: all 160ms ease;
}
.inbox-card:hover .inbox-actions { opacity: 1; transform: none; }
.accept-btn {
  font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.06em;
  color: var(--seal); border-bottom: 1px solid rgba(201,64,32,0.3); padding-bottom: 1px;
}
.change-btn {
  font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.06em; color: var(--ink-3);
}

/* ── Collections grid ── */
.coll-grid {
  display: grid; grid-template-columns: 1.4fr 1fr;
  gap: 18px; margin-bottom: 72px;
}
.coll-card {
  padding: 30px 30px 26px; border: 1px solid var(--line);
  position: relative; overflow: hidden;
  cursor: pointer; text-align: left; min-height: 190px;
  transition: transform 220ms ease, border-color 220ms ease;
  background: var(--surface);
}
.coll-card.indigo { background: var(--kachi); border-color: var(--kachi-line); }
.coll-card.sm { min-height: 155px; padding: 22px 22px 18px; }
.coll-card:hover { transform: translateY(-2px); }
.coll-card:not(.indigo):hover { border-color: rgba(201,64,32,0.2); }
.coll-card.indigo:hover { border-color: var(--kachi-soft); }
.circuit-svg { position: absolute; inset: 0; opacity: 0.2; pointer-events: none; }
.coll-meta {
  font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.10em;
  color: var(--ink-4); margin-bottom: 24px; position: relative;
}
.coll-card.indigo .coll-meta { color: rgba(232,226,217,0.3); }
.coll-title {
  font-family: 'Instrument Serif', serif; font-style: italic;
  font-size: 32px; font-weight: 400; line-height: 1.05;
  letter-spacing: -0.015em; color: var(--ink);
  margin-bottom: 8px; position: relative;
}
.coll-card.sm .coll-title { font-size: 24px; }
.coll-sub { font-size: 12px; color: var(--ink-3); line-height: 1.5; position: relative; }
.coll-card.indigo .coll-sub { color: rgba(232,226,217,0.4); }
.coll-hanko {
  position: absolute; top: 16px; right: 16px;
  width: 20px; height: 20px; border-radius: 50%;
  border: 1px solid rgba(201,64,32,0.4);
  display: flex; align-items: center; justify-content: center;
  font-family: serif; font-size: 9px; color: var(--seal);
}
.coll-corner {
  position: absolute; bottom: 16px; right: 16px;
  font-family: 'Geist Mono', monospace; font-size: 10px;
  color: var(--ink-4); opacity: 0; transition: opacity 180ms ease;
  display: flex; align-items: center; gap: 5px;
}
.coll-card:hover .coll-corner { opacity: 1; }
.coll-card.indigo .coll-corner { color: rgba(232,226,217,0.35); }

/* ── Recent list ── */
.recent-list { margin-bottom: 72px; }
.recent-row {
  display: grid; grid-template-columns: 36px 1fr 200px 70px 82px;
  align-items: center; gap: 20px; padding: 12px 4px;
  border-bottom: 1px solid var(--line-2);
  cursor: pointer; transition: background 130ms ease;
}
.recent-row:hover { background: rgba(232,226,217,0.025); }
html.light .recent-row:hover { background: rgba(27,24,19,0.025); }
.ext-tag { font-family: 'Geist Mono', monospace; font-size: 9px; letter-spacing: 0.08em; color: var(--ink-4); text-transform: uppercase; }
.recent-name { font-size: 13px; color: var(--ink); }
.recent-coll { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 13px; color: var(--ink-3); }
.recent-meta { font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--ink-4); text-align: right; }

/* ── File list (shelf view) ── */
.file-list { margin-bottom: 72px; }
.file-row {
  display: grid; grid-template-columns: 36px 1fr 140px 70px 80px 80px;
  align-items: center; gap: 18px; padding: 11px 4px;
  border-bottom: 1px solid var(--line-2);
  cursor: pointer; transition: background 130ms ease;
}
.file-row:hover { background: rgba(232,226,217,0.025); }
html.light .file-row:hover { background: rgba(27,24,19,0.025); }
.file-badge {
  display: inline-flex; align-items: center; justify-content: center;
  font-family: 'Geist Mono', monospace; font-size: 8px; letter-spacing: 0.06em;
  color: var(--ink-4); background: var(--surface-2);
  border: 1px solid var(--line); padding: 2px 5px;
  text-transform: uppercase;
}
.row-name { font-size: 13px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.row-folder { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 13px; color: var(--ink-3); }

            ? `${inbox.length} files arrived<br>since monday.<span class="soft"> shall I tidy?</span>`
            : `everything<br>in its place.<span class="soft"> well done.</span>`}
        </h1>
      </div>
      ${inbox.length > 0 ? `
      <div style="display:flex;gap:10px;padding-bottom:6px">
        <button id="tidyNowBtn" style="padding:9px 20px;font-size:13px;background:var(--seal);color:var(--ink);letter-spacing:0.02em;transition:background 160ms ease" onmouseover="this.style.background='var(--seal-soft)'" onmouseout="this.style.background='var(--seal)'">tidy now</button>
        <button style="padding:9px 18px;font-size:13px;border:1px solid var(--line);color:var(--ink-2);letter-spacing:0.02em">review later</button>
      </div>` : ''}
    </div>

    <div class="ask-bar">
      <span class="ask-prompt">›</span>
      <input class="ask-input" placeholder="what did i write about attention this winter?"/>
      <span class="mono quiet" style="font-size:11px;letter-spacing:0.05em">or drop a file</span>
      <div class="kbdchord"><span>⌘</span><span>K</span></div>
    </div>

    ${tidySection}

    <div style="margin-bottom:72px">
      <div class="section-head">
        <span class="section-num">${inbox.length > 0 && !tidied ? '02' : '01'}</span>
        <span class="section-title">collections</span>
        <span class="section-sub">4 · sorted as you keep them</span>
      </div>
      <div class="coll-grid">
        ${COLLECTIONS.map((c, i) => collCardHTML(c, i < 2)).join('')}
      </div>
    </div>

    <div class="recent-list">
      <div class="section-head">
        <span class="section-num">${inbox.length > 0 && !tidied ? '03' : '02'}</span>
        <span class="section-title">recent</span>
        <span class="section-sub">last things you touched</span>
      </div>
      ${RECENT.map(recentRowHTML).join('')}
    </div>

    <div class="footer">
      <div class="footer-phrase"><span class="footer-kanji">整 </span>everything in its place.</div>
      <div class="footer-meta">last reviewed · 14 minutes ago</div>
    </div>`;
}

function renderSpace(title, count, files, headline) {
  return `
    <div class="page-header" style="margin-bottom:36px">
      <div>
        <div class="datestamp">${title} · ${count} files</div>
        <h1 class="headline">${headline}</h1>
      </div>
    </div>
    <div class="ask-bar">
      <span class="ask-prompt">›</span>
      <input class="ask-input" placeholder="search ${title} files…"/>
      <span class="mono quiet" style="font-size:11px;letter-spacing:0.05em">or drop a file</span>
    </div>
    <div class="file-list">
      <div class="section-head">
        <span class="section-num">01</span>
        <span class="section-title">${title}</span>
        <span class="section-sub">${count} files</span>
        <div class="section-right"><span class="section-link">sort by date</span></div>
      </div>
      ${files.map(fileRowHTML).join('')}
    </div>
    <div class="footer">
      <div class="footer-phrase"><span class="footer-kanji">整 </span>everything in its place.</div>
      <div class="footer-meta">${count} files · ${title}</div>
    </div>`;
}

function renderInbox() {
  const items = inboxItems;
  if (items.length === 0) {
    return `
      <div class="page-header" style="margin-bottom:36px">
        <div>
          <div class="datestamp">inbox · awaiting placement</div>
          <h1 class="headline">inbox is clear.<span class="soft"> nothing waiting.</span></h1>
        </div>
      </div>
      <div class="empty-state">no files awaiting placement.</div>
      <div class="footer">
        <div class="footer-phrase"><span class="footer-kanji">整 </span>everything in its place.</div>
        <div class="footer-meta">0 files pending</div>
      </div>`;
  }
  return `
    <div class="page-header" style="margin-bottom:36px">
      <div style="flex:1">
        <div class="datestamp">inbox · awaiting placement</div>
        <h1 class="headline">${items.length} files waiting<br><span class="soft">for a home.</span></h1>
      </div>
      <div style="display:flex;gap:10px;padding-bottom:6px">
        <button id="placeAllBtn2" style="padding:9px 20px;font-size:13px;background:var(--seal);color:var(--ink);letter-spacing:0.02em;transition:background 160ms ease" onmouseover="this.style.background='var(--seal-soft)'" onmouseout="this.style.background='var(--seal)'">place all</button>
      </div>
    </div>
    <div class="section-head">
      <span class="section-num">01</span>
      <span class="section-title">awaiting placement</span>
      <span class="section-sub">${items.length} files</span>
    </div>
    <div class="inbox-grid" id="inboxGrid" style="margin-bottom:64px">
      ${items.map(inboxCardHTML).join('')}
    </div>
    <div class="footer">
      <div class="footer-phrase"><span class="footer-kanji">整 </span>everything in its place.</div>
      <div class="footer-meta">${items.length} files pending placement</div>
    </div>`;
}

function renderShelf(title, files, desc) {
  return `
    <div class="page-header" style="margin-bottom:36px">
      <div>
        <div class="datestamp">shelves · ${title}</div>
        <h1 class="headline">${desc}</h1>
      </div>
    </div>
    <div class="ask-bar">
      <span class="ask-prompt">›</span>
      <input class="ask-input" placeholder="search ${title.toLowerCase()}…"/>
      <span class="mono quiet" style="font-size:11px;letter-spacing:0.05em">or drop a file</span>
    </div>
    <div class="file-list">
      <div class="section-head">
        <span class="section-num">01</span>
        <span class="section-title">${title}</span>
        <span class="section-sub">${files.length} files</span>
        <div class="section-right"><span class="section-link">sort by name</span></div>
      </div>
      ${files.map(fileRowHTML).join('')}
    </div>
    <div class="footer">
      <div class="footer-phrase"><span class="footer-kanji">整 </span>everything in its place.</div>
      <div class="footer-meta">${files.length} files · ${title.toLowerCase()}</div>

const VIEWS = {
  everything: renderEverything,
  work:       () => renderSpace('work', 312, WORK_FILES, '312 files.<br><span class="soft">your workspace.</span>'),
  personal:   () => renderSpace('personal', 287, PERSONAL_FILES, '287 personal<br><span class="soft">files, kept close.</span>'),
  archive:    () => renderSpace('archive', 119, ARCHIVE_FILES, '119 files<br><span class="soft">at rest.</span>'),
  inbox:      renderInbox,
  documents:  () => renderShelf('Documents', DOCUMENTS, `${DOCUMENTS.length} documents.<br><span class="soft">all your written work.</span>`),
  images:     () => renderShelf('Images', IMAGES, `${IMAGES.length} images.<span class="soft"><br>stills and screenshots.</span>`),
  audio:      () => renderShelf('Audio & Voice', AUDIO, `${AUDIO.length} audio files.<br><span class="soft">recordings and memos.</span>`),
  code:       () => renderShelf('Code', CODE, `${CODE.length} code files.<br><span class="soft">scripts and configs.</span>`),
  web:        () => renderShelf('Web', WEB, `${WEB.length} web links<br><span class="soft">and saved pages.</span>`),
};

/* ════════════════════════════════════════════════════════
   VIEW SWITCHING
════════════════════════════════════════════════════════ */
function setView(viewId) {
  currentView = viewId;
  const main = document.getElementById('main');
  main.style.opacity = '0';
  main.style.transform = 'translateY(6px)';
  setTimeout(() => {
    main.innerHTML = VIEWS[viewId] ? VIEWS[viewId]() : '';
    main.style.transition = 'none';
    main.style.opacity = '0';
    main.style.transform = 'translateY(6px)';
    requestAnimationFrame(() => {
      main.style.transition = 'opacity 260ms ease, transform 260ms ease';
      main.style.opacity = '1';
      main.style.transform = 'none';
    });
    bindViewEvents();
    main.scrollTop = 0;
  }, 120);

  // Update rail
  document.querySelectorAll('.rail-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === viewId);
  });
}

function bindViewEvents() {
  // Accept buttons
  document.querySelectorAll('.accept-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.id);
      placeFile(id);
    });
  });

  // Place all
  const placeAll = document.getElementById('placeAllBtn') || document.getElementById('placeAllBtn2');
  if (placeAll) {
    placeAll.addEventListener('click', () => {
      const ids = inboxItems.map(f => f.id);
      ids.forEach((id, i) => setTimeout(() => placeFile(id), i * 100));
    });
  }

  // Tidy now
  const tidyNow = document.getElementById('tidyNowBtn');
  if (tidyNow) {
    tidyNow.addEventListener('click', () => {
      doTidy();
      document.getElementById('tidyBtn').querySelector('#tidyTitle').textContent = 'tidied today.';
      document.getElementById('tidyBtn').querySelector('#tidySub').textContent = 'tomorrow morning, again.';
    });
  }

  // Card click → disambig for uncertain files
  document.querySelectorAll('.inbox-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.classList.contains('accept-btn') || e.target.classList.contains('change-btn')) return;
      const id = parseInt(card.dataset.id);
      const file = inboxItems.find(f => f.id === id);
      if (file && file.cls === 'mid') {
        document.getElementById('disambigOverlay').style.display = 'flex';
        document.querySelector('.disambig-filename').textContent = file.name;
      }
    });
  });
}

function placeFile(id) {
  inboxItems = inboxItems.filter(f => f.id !== id);
  updateInboxCount();
  // Animate card out if visible
  const card = document.querySelector(`.inbox-card[data-id="${id}"]`);
  if (card) {
    card.style.transition = 'opacity 220ms ease, transform 220ms ease';
    card.style.opacity = '0';
    card.style.transform = 'translateY(-6px)';
    setTimeout(() => card.remove(), 230);
  }
  // Update label
  const sub = document.getElementById('inboxSubLabel');
  if (sub) sub.textContent = `${inboxItems.length} awaiting placement`;
}

function doTidy() {
  tidied = true;
  const ids = inboxItems.map(f => f.id);
  ids.forEach((id, i) => setTimeout(() => placeFile(id), i * 100));
  setTimeout(() => setView('everything'), ids.length * 100 + 200);
}

function updateInboxCount() {
  const cnt = document.getElementById('inboxCount');
  if (cnt) cnt.textContent = inboxItems.length;
}

/* ════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {

  // Initial render
  setView('everything');

  // Rail navigation
  document.querySelectorAll('.rail-item').forEach(item => {
    item.addEventListener('click', () => setView(item.dataset.view));
  });

  // Tidy rail button
  document.getElementById('tidyBtn').addEventListener('click', function() {
    doTidy();
    this.querySelector('#tidyTitle').textContent = 'tidied today.';
    this.querySelector('#tidySub').textContent = 'tomorrow morning, again.';
  });

  // ── Kanji toggle ────────────────────────────────────
  const kanjiBtn = document.getElementById('kanjiToggle');
  kanjiBtn.addEventListener('click', () => {
    const off = document.documentElement.classList.toggle('no-kanji');
    kanjiBtn.classList.toggle('active', off);
    kanjiBtn.title = off ? 'Show kanji characters' : 'Hide kanji characters';
  });

  // ── Theme toggle ────────────────────────────────────
  const themeBtn = document.getElementById('themeToggle');
  themeBtn.addEventListener('click', () => {
    const isLight = document.documentElement.classList.toggle('light');
    document.documentElement.classList.toggle('dark', !isLight);
    themeBtn.textContent = isLight ? '☾' : '☀';
    themeBtn.title = isLight ? 'Switch to dark mode' : 'Switch to light mode';
  });

  // ── Disambiguation overlay ──────────────────────────
  document.getElementById('disambigOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('disambigOverlay'))
      document.getElementById('disambigOverlay').style.display = 'none';
  });
  document.querySelectorAll('.disambig-choice').forEach(c => {
    c.addEventListener('click', () => {
      document.querySelectorAll('.disambig-choice').forEach(x => x.classList.remove('selected'));
      c.classList.add('selected');
    });
  });
  document.getElementById('disambigSkip').addEventListener('click', () => {
    document.getElementById('disambigOverlay').style.display = 'none';
  });
  document.getElementById('disambigConfirm').addEventListener('click', () => {
    document.getElementById('disambigOverlay').style.display = 'none';
  });

  // ── Keyboard shortcut ⌘K ───────────────────────────
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      const input = document.querySelector('.ask-input');
      if (input) { input.focus(); }
    }
    if (e.key === 'Escape') {
      document.getElementById('disambigOverlay').style.display = 'none';
    }
  });

  // ── Ask button ──────────────────────────────────────
  document.getElementById('askTrigger').addEventListener('click', () => {
    const input = document.querySelector('.ask-input');
    if (input) input.focus();
  });

});
</script>
</body>
</html>
